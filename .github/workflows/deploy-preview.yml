name: Deploy Preview

on:
  push:
    branches-ignore:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Sanitize branch name
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]')
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll
        run: |
          cd docs
          bundle exec jekyll build --baseurl "/${{ env.BRANCH }}" -d ../_site
          touch ../_site/.nojekyll

      - name: Commit preview to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r _site /tmp/preview-site

          git fetch origin main
          git checkout main
          git pull origin main

          rm -rf docs/${{ env.BRANCH }}
          mkdir -p docs/${{ env.BRANCH }}
          cp -r /tmp/preview-site/. docs/${{ env.BRANCH }}/

          git add docs/${{ env.BRANCH }}
          if ! git diff --cached --quiet; then
            git commit -m "preview: update ${{ env.BRANCH }}"
            git push origin main
          fi
