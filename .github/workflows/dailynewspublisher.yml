name: Daily News Publisher

on:
  schedule:
    # 6 runs/day — each publishes 1 post per niche (AI + Security) = up to 6 AI + 6 Security
    - cron: '0 6 * * *'    # 07:00 Rome - Early morning
    - cron: '0 9 * * *'    # 10:00 Rome - Mid morning
    - cron: '0 12 * * *'   # 13:00 Rome - Midday
    - cron: '0 15 * * *'   # 16:00 Rome - Afternoon
    - cron: '0 18 * * *'   # 19:00 Rome - Evening
    - cron: '0 21 * * *'   # 22:00 Rome - Night
  workflow_dispatch:

jobs:
  run-daily-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run main.py
      env:
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        TWITTER_ENABLED: "true"
      run: python main.py --action=news

    - name: Commit and Push changes
      run: |
        find . -type d -name "__pycache__" -exec rm -r {} +
        find . -name "*.pyc" -delete
        git add .
        TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
        git commit -m "Auto: Daily news update at $TIMESTAMP" || echo "No changes to commit"
        git push origin main
