# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings - BRAND
title: eof.news
# Value proposition: outcome + audience (see docs/plans/marketing-header-and-creators.md for options)
tagline: "Today's tech signal for engineers who build"
tagline_sub: "Curated daily from 50+ sources — AI, security, cloud, devtools."
email: ipsedigitmail@gmail.com
description: >- 
  Today's tech signal for engineers who build. AI, security, cloud, devtools and 
  software engineering curated daily. No noise, just signal.
baseurl: ""
url: "https://ipsedigit.github.io"
lang: en

# =============================================================================
# MONETIZATION - Configura qui i tuoi ID per iniziare a guadagnare
# =============================================================================

# Google AdSense - Ottieni il tuo ID su https://www.google.com/adsense
# adsense_id: ca-pub-XXXXXXXXXX

# Buy Me a Coffee - https://www.buymeacoffee.com
# buymeacoffee: techpulsedaily

# Newsletter (Buttondown, Substack, etc.)
# newsletter_url: https://buttondown.email/techpulse

# Social / SEO
twitter:
  username: eaborea
  card: summary_large_image
social:
  name: eof.news
  links:
    - https://github.com/ipsedigit
github_username: ipsedigit

# SEO defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "ipsedigit"

# Collections
collections:
  devlogs:
    output: false   # no individual post pages needed

# Build settings
theme: minima
paginate: 15
paginate_path: "/page/:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
