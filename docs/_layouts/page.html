---
layout: base
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{% if page.title_badge %}<span style="padding:3px 10px; border-radius:12px; font-size:0.5em; font-weight:bold; vertical-align:middle; background:{{ page.title_badge_bg }}; color:{{ page.title_badge_color }};">{{ page.title_badge }}</span> {% endif %}{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
